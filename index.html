<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fruit Website</title>
    <link rel="shortcut icon" href="./assets/apple.PNG" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-amber-50">
    <main>
      <!-- banner -->
      <section class="relative">
        <figure class="bg-cover md:h-[350px] lg:h-[500px]">
          <img
            class="w-full h-full object-cover"
            src="./assets/banner.jpg"
            alt="banner image"
          />
        </figure>
        <div
          class="absolute inset-0 flex flex-col items-center justify-center"
        >
          <h2 class="text-4xl md:text-6xl lg:text-8xl text-amber-100 mb-3 font-bold">
            FruitNest
          </h2>
          <p class="text-amber-50 lg:text-2xl">Eat Fresh and healthy fruits</p>
        </div>
      </section>
      <!-- cards -->
      <section class="grid md:grid-cols-12 w-11/12 mx-auto p-5 gap-3">
        <div class="col-span-9">
          <h2 class="text-2xl text-center font-semibold mb-3">Top Fruits</h2>
          <div class="grid  grid-cols-2 lg:grid-cols-3 gap-3" id="product-box">
            <div class="card bg-base-100 w-full shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300">
              <figure class="px-5 pt-5">
                <img
                  src="./assets/apple.PNG"
                  alt="apple"
                  class="w-full h-48 object-cover rounded-lg"
                  id=""
                />
              </figure>
              <div class="card-body items-center text-center">
                <h2 id="" class="card-title">Apple</h2>
                <p class="text-gray-500"><span id="">200.00 </span>Tk</p>

                <button
                  id=""
                  class="btn bg-linear-to-r from bg-amber-300 to-lime-300 btn-block"
                >
                  Buy Now
                </button>
              </div>
            </div>
            <div class="card bg-base-100 w-full shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300">
              <figure class="px-5 pt-5">
                <img
                  src="./assets/mango.jpg"
                  alt="apple"
                  class="w-full h-48 object-cover rounded-lg"
                />
              </figure>
              <div class="card-body items-center text-center">
                <h2 class="card-title">Mango</h2>
                <p class="text-gray-500">150.43 Tk</p>

                <button
                  class="btn bg-linear-to-r from bg-amber-300 to-lime-300 btn-block"
                >
                  Buy Now
                </button>
              </div>
            </div>
            <div class="card bg-base-100 w-full shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300">
              <figure class="px-5 pt-5">
                <img
                  src="./assets/strawberry.jpg"
                  alt="apple"
                  class="w-full h-48 object-cover rounded-lg"
                />
              </figure>
              <div class="card-body items-center text-center">
                <h2 class="card-title">Strawberry</h2>
                <p class="text-gray-500">800.50 Tk</p>

                <button
                  class="btn bg-linear-to-r from bg-amber-300 to-lime-300 btn-block"
                >
                  Buy Now
                </button>
              </div>
            </div>
            <div class="card bg-base-100 w-full shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300">
              <figure class="px-5 pt-5">
                <img
                  src="./assets/banana.jpg"
                  alt="apple"
                  class="w-full h-48 object-cover rounded-lg"
                />
              </figure>
              <div class="card-body items-center text-center">
                <h2 class="card-title">Banana</h2>
                <p class="text-gray-500">100.75 Tk</p>

                <button
                  class="btn bg-linear-to-r from bg-amber-300 to-lime-300 btn-block"
                >
                  Buy Now
                </button>
              </div>
            </div>
            <div class="card bg-base-100 w-full shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300">
              <figure class="px-5 pt-5">
                <img
                  src="./assets/orange.PNG"
                  alt="apple"
                  class="w-full h-48 object-cover rounded-lg"
                />
              </figure>
              <div class="card-body items-center text-center">
                <h2 class="card-title">Orange</h2>
                <p class="text-gray-500">300.00 Tk</p>

                <button
                  class="btn bg-linear-to-r from bg-amber-300 to-lime-300 btn-block"
                >
                  Buy Now
                </button>
              </div>
            </div>
            <div class="card bg-base-100 w-full shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300">
              <figure class="px-5 pt-5">
                <img
                  src="./assets/pomegranate.jpg"
                  alt="apple"
                  class="w-full h-48 object-cover rounded-lg"
                />
              </figure>
              <div class="card-body items-center text-center">
                <h2 class="card-title">Pomegranate</h2>
                <p class="text-gray-500">500.19 Tk</p>

                <button
                  class="btn bg-linear-to-r from bg-amber-300 to-lime-300 btn-block"
                >
                  Buy Now
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-span-3 sticky top-5 h-fit">
          <h2 class="text-2xl text-center font-semibold mb-3">Order Details</h2>
          <div id="parent-container" class="space-y-3"></div>
          <p class="my-5">
            Total Amount:
            <span id="total-amount" class="font-semibold">0</span> TK
          </p>
        </div>
      </section>
    </main>
    <script src="JavaScript/index.js"></script>
  </body>
</html>
